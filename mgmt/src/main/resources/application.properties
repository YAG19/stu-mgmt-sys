# JWT configuration
# Override jwt.secret in production via env var JWT_SECRET (must be >= 32 bytes for HS256)
jwt.secret=${JWT_SECRET:change-this-dev-secret-please-use-a-long-random-value-1234567890}
jwt.expiration-ms=86400000

# Admin login credentials (override in production via env vars)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin}
